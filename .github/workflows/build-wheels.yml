# .github/workflows/build_and_test.yml

name: Build and Test

# Run on pushes to any branch, any tag, on pull requests, or manually
on:
  push:
    tags: ['v*']
  pull_request:
  workflow_dispatch:

# Set default permissions to read-only for security
permissions:
  contents: read

# Ensure only one run per branch/PR, canceling older runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Build the source distribution (sdist) and universal wheel
  # ------------------------------------------------------------------
  build:
    name: Build Distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distributions artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error # Fail if build produced no files

  # ------------------------------------------------------------------
  # Test the built wheel on multiple OS and Python versions
  # ------------------------------------------------------------------
  test:
    name: Test Wheel • ${{ matrix.os }} • py${{ matrix.py }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        py: ["3.11", "3.12"]

    steps:
      # FIX: Checkout the repo to make pyproject.toml available for caching
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.py }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
          cache: "pip"

      - name: Download distributions artifact
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Install from wheel
        run: python -m pip install dist/*.whl

      - name: Run smoke test
        run: |
          python -c "import matrix_sdk; print(f'Import OK, version: {matrix_sdk.__version__}')"

  # ------------------------------------------------------------------
  # Optional: Create a GitHub Release when a new version tag is pushed
  # ------------------------------------------------------------------
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test] # Run only after tests pass
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permission to create the release
    steps:
      - name: Download distributions artifact
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*