# .github/workflows/build_and_test.yml

name: Build, Test, and Release

# Run on pushes, pull requests, or manually
on:
  push:
    tags: ['v*'] # Important: This is the trigger for releases
  pull_request:
  workflow_dispatch:

# Set default permissions to read-only for security
permissions:
  contents: read

# Ensure only one run per branch/PR, canceling older runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Build the source distribution (sdist) and universal wheel
  # ------------------------------------------------------------------
  build:
    name: Build Distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: python -m pip install --upgrade pip build wheel

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distributions artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  # ------------------------------------------------------------------
  # Test the built wheel on multiple OS and Python versions
  # ------------------------------------------------------------------
  test:
    name: Test Wheel • ${{ matrix.os }} • py${{ matrix.py }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        py: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.py }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
          cache: "pip"

      - name: Download distributions artifact
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Install from wheel
        shell: bash
        run: python -m pip install dist/*.whl

      - name: Run smoke test
        run: |
          python -c "import importlib.metadata as im; print('Import OK, version:', im.version('matrix-python-sdk'))"

  # ------------------------------------------------------------------
  # Create a GitHub Release when a new version tag is pushed
  # ------------------------------------------------------------------
  release:
    name: Create GitHub Release
    # This job only runs when a tag starting with 'v' is pushed
    if: startsWith(github.ref, 'refs/tags/')
    # It runs only after all test jobs have passed
    needs: [test]
    runs-on: ubuntu-latest
    # Elevate permissions to allow writing a release
    permissions:
      contents: write
    steps:
      - name: Download distributions artifact
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          # Use the tag name (e.g., "v0.1.11") as the release title
          name: Release ${{ github.ref_name }}
          # Mark this as a final, production release.
          # Change to 'true' if you want to mark it as a pre-release.
          prerelease: false
          # Upload all files from the dist/ directory as release assets
          files: dist/*