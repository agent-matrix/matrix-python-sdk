name: Build & test Python distributions

on:
  push:            # run on every commit
    branches: ['**']
    tags:     ['v*']   # also run when you push a version tag
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (sdist + universal wheel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build backend
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: List dist/
        run: ls -la dist

      - name: Upload distributions as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  test:
    name: Test wheel • ${{ matrix.os }} • py${{ matrix.py }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        py: ["3.11", "3.12"]

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Show downloaded files
        run: |
          ls -la dist || dir dist

      - name: Install built wheel (prefer wheel over sdist)
        shell: bash
        run: |
          set -euo pipefail
          WHEEL="$(ls dist/*.whl 2>/dev/null | head -n 1 || true)"
          if [[ -n "${WHEEL}" ]]; then
            python -m pip install "${WHEEL}"
          else
            python -m pip install dist/*.tar.gz
          fi

      - name: Smoke test import
        shell: bash
        run: |
          python - <<'PY'
          import matrix_sdk as m
          print("matrix_sdk version:", getattr(m, "__version__", "unknown"))
          assert hasattr(m, "__all__")
          print("import OK")
          PY

  # Optional: attach artifacts to a GitHub Release when tagging
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
