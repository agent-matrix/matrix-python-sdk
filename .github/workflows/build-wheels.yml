name: Build wheels

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  wheels:
    name: Wheels • ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (driver)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install -U pip cibuildwheel

      - name: Build wheels with cibuildwheel
        env:
          # Your project supports 3.11 and 3.12
          CIBW_BUILD: "cp311-* cp312-*"
          # Avoid 32-bit, PyPy, and old manylinux
          CIBW_SKIP: "pp* *-win32 *-manylinux_i686"
          # Architectures per OS (adjust if you want fewer/faster builds)
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"   # or 'universal2' for compiled extensions
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          # Quick import smoke test for each wheel
          CIBW_TEST_COMMAND: "python -c \"import matrix_sdk; print(getattr(matrix_sdk, '__version__', 'ok'))\""
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    name: Source distribution (sdist)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install -U pip build
          python -m build --sdist
          ls -la dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
